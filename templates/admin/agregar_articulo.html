<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Agregar Artículo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/mascotasnet.css' %}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{% static 'img/logo.png' %}" alt="Logo" class="brand-icon-img" style="width:42px;height:42px;object-fit:contain;">
                <span>MascotasNet</span>
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center gap-1">
                    <li class="nav-item"><span class="nav-link" style="color:var(--primary); font-weight:600;">Panel Admin</span></li>
                    <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                    <li class="nav-item ms-2"><a class="nav-link btn-nav-login" href="/logout/" style="background:#E53E3E !important;">Salir</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <span class="section-label">Administrador</span>
            <h1>Agregar Artículo</h1>
        </div>
    </div>

    <section class="py-5">
        <div class="container">
            <div class="mb-4 border-bottom">
                <ul class="nav nav-tabs" style="border-bottom:none;">
                    <li class="nav-item">
                        <a class="nav-link text-muted" href="/admin-panel/productos/">Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-muted" href="/admin-panel/mascotas/">Mascotas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin-panel/articulos/" style="font-weight:600;">Artículos</a>
                    </li>
                </ul>
            </div>

            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div style="background:white; border:1px solid var(--border); border-radius:var(--radius-lg); padding:32px; box-shadow:var(--shadow-sm);">
                        
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Título del Artículo</label>
                                <input type="text" name="titulo" class="form-control" required>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Categoría</label>
                                    <select name="categoria" class="form-select" required>
                                        <option value="Cuidado General">Cuidado General</option>
                                        <option value="Nutrición">Nutrición</option>
                                        <option value="Salud y Medicina">Salud y Medicina</option>
                                        <option value="Comportamiento">Comportamiento</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Fecha de Publicación</label>
                                    <input type="date" name="fecha_publicacion" class="form-control" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Contenido</label>
                                <textarea name="contenido" class="form-control" rows="12" placeholder="Escribe aquí el contenido de tu artículo..." required></textarea>
                            </div>

                            <div class="d-flex justify-content-between mt-4">
                                <a href="/admin-panel/articulos/" class="btn btn-outline-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">Publicar Artículo</button>
                            </div>
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <hr class="footer-divider" style="margin-top:0;">
            <p class="footer-bottom">2026 MascotasNet</p>
        </div>
    </footer>

</body>
</html>

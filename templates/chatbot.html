{% load static %}
<!-- MascotasNet Floating Chatbot Widget -->
<div id="mascotasnet-chat-widget" style="position: fixed; bottom: 24px; right: 24px; z-index: 1050; font-family: 'Inter', system-ui, -apple-system, sans-serif;">
    <!-- Floating Chat Button -->
    <button id="chat-toggle-btn" style="
        height: 54px;
        border-radius: 27px;
        background: linear-gradient(135deg, var(--primary, #E8602C), var(--primary-light, #FF8C42));
        border: none;
        box-shadow: 0 8px 24px rgba(232, 96, 44, 0.35);
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 20px 0 16px;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        outline: none;
        position: relative;
    ">
        <!-- Chat Icon SVG -->
        <svg id="chat-icon-open" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="transition: transform 0.3s;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
        <span id="chat-btn-text" style="font-weight: 600; font-size: 14px; white-space: nowrap; transition: opacity 0.2s;">Asistente IA MascotasNet</span>
        
        <svg id="chat-icon-close" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display: none; transition: transform 0.3s;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
        <!-- Pulsing Notification Dot -->
        <span id="chat-notification-dot" style="
            position: absolute;
            top: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background-color: #10B981;
            border: 2px solid white;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 2s infinite;
        "></span>
    </button>

    <!-- Chat Window Container -->
    <div id="chat-window" style="
        position: absolute;
        bottom: 75px;
        right: 0;
        width: 360px;
        height: 500px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 20px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transform: translateY(20px) scale(0.95);
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2);
    ">
        <!-- Header -->
        <div style="
            background: linear-gradient(135deg, var(--primary, #E8602C), var(--primary-light, #FF8C42));
            padding: 16px 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        ">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="
                    width: 36px;
                    height: 36px;
                    border-radius: 50%;
                    background: rgba(255, 255, 255, 0.2);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 18px;
                ">🤖</div>
                <div>
                    <h5 style="margin: 0; font-size: 15px; font-weight: 700; letter-spacing: 0.3px;">Asistente MascotasNet</h5>
                    <span style="font-size: 11px; color: rgba(255, 255, 255, 0.85); display: flex; align-items: center; gap: 4px;">
                        <span style="width: 6px; height: 6px; background-color: #10B981; border-radius: 50%; display: inline-block;"></span> Activo ahora
                    </span>
                </div>
            </div>
            <button id="chat-close-btn" style="
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.8);
                cursor: pointer;
                padding: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: color 0.2s;
            ">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Message Body -->
        <div id="chat-messages-container" style="
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #F9FAFB;
        ">
            <!-- Welcome Message -->
            <div class="msgmsg bot-msg" style="align-self: flex-start; max-width: 80%;">
                <div style="
                    background: white;
                    color: #1F2937;
                    padding: 10px 14px;
                    border-radius: 16px 16px 16px 4px;
                    font-size: 14px;
                    line-height: 1.45;
                    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
                    border: 1px solid rgba(0, 0, 0, 0.04);
                ">
                    ¡Hola! 🐾 Soy tu asistente virtual de MascotasNet. ¿En qué puedo ayudarte hoy? Puedes preguntarme sobre adopciones, productos de la tienda o consejos de cuidado.
                </div>
            </div>
        </div>

        <!-- Typing Indicator (Hidden by default) -->
        <div id="chat-typing-indicator" style="
            display: none;
            align-self: flex-start;
            margin-left: 20px;
            margin-bottom: 12px;
            background: white;
            padding: 10px 16px;
            border-radius: 16px 16px 16px 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.04);
        ">
            <span style="display: inline-flex; align-items: center; gap: 4px;">
                <span class="typing-dot" style="width: 6px; height: 6px; background-color: #9CA3AF; border-radius: 50%; display: inline-block; animation: bounce-dot 1.4s infinite ease-in-out both;"></span>
                <span class="typing-dot" style="width: 6px; height: 6px; background-color: #9CA3AF; border-radius: 50%; display: inline-block; animation: bounce-dot 1.4s infinite ease-in-out both; animation-delay: 0.2s;"></span>
                <span class="typing-dot" style="width: 6px; height: 6px; background-color: #9CA3AF; border-radius: 50%; display: inline-block; animation: bounce-dot 1.4s infinite ease-in-out both; animation-delay: 0.4s;"></span>
            </span>
        </div>

        <!-- Input Box -->
        <form id="chat-input-form" style="
            padding: 12px 16px;
            background: white;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            gap: 8px;
        ">
            <input type="text" id="chat-input-field" placeholder="Escribe tu mensaje..." autocomplete="off" style="
                flex: 1;
                border: 1px solid #E5E7EB;
                border-radius: 24px;
                padding: 10px 16px;
                font-size: 14px;
                outline: none;
                transition: border-color 0.2s;
            " />
            <button type="submit" id="chat-submit-btn" style="
                width: 38px;
                height: 38px;
                border-radius: 50%;
                background: var(--primary, #E8602C);
                border: none;
                color: white;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background-color 0.2s, transform 0.1s;
                outline: none;
            ">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
        </form>
    </div>
</div>

<style>
    /* Styling keyframes */
    @keyframes pulse-dot {
        0% { transform: scale(0.9); opacity: 1; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
        70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
        100% { transform: scale(0.9); opacity: 1; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
    @keyframes bounce-dot {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
    }
    #chat-toggle-btn:hover {
        transform: scale(1.08);
        box-shadow: 0 10px 28px rgba(232, 96, 44, 0.45);
    }
    #chat-toggle-btn:active {
        transform: scale(0.95);
    }
    #chat-input-field:focus {
        border-color: var(--primary, #E8602C);
    }
    #chat-submit-btn:hover {
        background-color: var(--primary-dark, #C44A1A);
        transform: scale(1.05);
    }
    #chat-submit-btn:active {
        transform: scale(0.95);
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const toggleBtn = document.getElementById("chat-toggle-btn");
        const closeBtn = document.getElementById("chat-close-btn");
        const windowContainer = document.getElementById("chat-window");
        const messagesContainer = document.getElementById("chat-messages-container");
        const inputField = document.getElementById("chat-input-field");
        const inputForm = document.getElementById("chat-input-form");
        const typingIndicator = document.getElementById("chat-typing-indicator");
        const notificationDot = document.getElementById("chat-notification-dot");
        const openIcon = document.getElementById("chat-icon-open");
        const closeIcon = document.getElementById("chat-icon-close");
        const btnText = document.getElementById("chat-btn-text");

        let isOpen = false;

        // Toggle chat window visibility
        function toggleChat() {
            isOpen = !isOpen;
            if (isOpen) {
                windowContainer.style.pointerEvents = "auto";
                windowContainer.style.opacity = "1";
                windowContainer.style.transform = "translateY(0) scale(1)";
                openIcon.style.display = "none";
                btnText.style.display = "none";
                toggleBtn.style.padding = "0";
                toggleBtn.style.width = "54px";
                closeIcon.style.display = "block";
                notificationDot.style.display = "none";
                inputField.focus();
                // Scroll to bottom
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            } else {
                windowContainer.style.pointerEvents = "none";
                windowContainer.style.opacity = "0";
                windowContainer.style.transform = "translateY(20px) scale(0.95)";
                openIcon.style.display = "block";
                btnText.style.display = "block";
                toggleBtn.style.padding = "0 20px 0 16px";
                toggleBtn.style.width = "";
                closeIcon.style.display = "none";
            }
        }

        toggleBtn.addEventListener("click", toggleChat);
        closeBtn.addEventListener("click", toggleChat);

        // Load chat history from sessionStorage
        const savedHistory = sessionStorage.getItem("mascotasnet_chat_history");
        if (savedHistory) {
            const history = JSON.parse(savedHistory);
            history.forEach(msg => {
                appendMessage(msg.text, msg.sender);
            });
            // Hide notification dot if they have history (implying they already saw the welcome)
            notificationDot.style.display = "none";
        }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement("div");
            msgDiv.classList.add("msgmsg");
            msgDiv.style.maxWidth = "80%";
            
            if (sender === "user") {
                msgDiv.style.alignSelf = "flex-end";
                msgDiv.innerHTML = `
                    <div style="
                        background: var(--primary, #E8602C);
                        color: white;
                        padding: 10px 14px;
                        border-radius: 16px 16px 4px 16px;
                        font-size: 14px;
                        line-height: 1.45;
                        box-shadow: 0 2px 6px rgba(232, 96, 44, 0.15);
                    ">${escapeHtml(text)}</div>
                `;
            } else {
                msgDiv.style.alignSelf = "flex-start";
                msgDiv.innerHTML = `
                    <div style="
                        background: white;
                        color: #1F2937;
                        padding: 10px 14px;
                        border-radius: 16px 16px 16px 4px;
                        font-size: 14px;
                        line-height: 1.45;
                        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
                        border: 1px solid rgba(0, 0, 0, 0.04);
                    ">${text}</div>
                `;
            }

            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function saveMessageToHistory(text, sender) {
            let history = [];
            const savedHistory = sessionStorage.getItem("mascotasnet_chat_history");
            if (savedHistory) {
                history = JSON.parse(savedHistory);
            }
            history.push({ text, sender });
            sessionStorage.setItem("mascotasnet_chat_history", JSON.stringify(history));
        }

        function escapeHtml(string) {
            return String(string).replace(/[&<>"']/g, function(s) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[s];
            });
        }

        // Submit form
        inputForm.addEventListener("submit", function(e) {
            e.preventDefault();
            const messageText = inputField.value.trim();
            if (!messageText) return;

            // Clear input field
            inputField.value = "";

            // Display user message
            appendMessage(messageText, "user");
            saveMessageToHistory(messageText, "user");

            // Show typing indicator
            typingIndicator.style.display = "block";
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            // Fetch request
            fetch("/chat-api/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify({ mensaje: messageText })
            })
            .then(res => {
                if (!res.ok) throw new Error("HTTP error " + res.status);
                return res.json();
            })
            .then(data => {
                // Hide typing indicator
                typingIndicator.style.display = "none";

                if (data.respuesta_ia) {
                    appendMessage(data.respuesta_ia, "bot");
                    saveMessageToHistory(data.respuesta_ia, "bot");
                } else if (data.error) {
                    appendMessage("Lo siento, ocurrió un error al consultar con el asistente: " + data.error, "bot");
                }
            })
            .catch(error => {
                typingIndicator.style.display = "none";
                appendMessage("Error de conexión. Por favor, inténtalo de nuevo.", "bot");
                console.error("Chat error:", error);
            });
        });
    });
</script>

<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña Cambiada - MascotasNet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/mascotasnet.css' %}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{% static 'img/logo.png' %}" alt="Logo" class="brand-icon-img" style="width:42px;height:42px;object-fit:contain;">
                <span>MascotasNet</span>
            </a>
        </div>
    </nav>

    <div class="login-page">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5 col-lg-4">
                    <div class="login-card text-center">
                        <div style="width:64px;height:64px;background:linear-gradient(135deg,#d4edda,#c3e6cb);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;">✅</div>
                        <h2>Contraseña Cambiada</h2>
                        <p class="login-subtitle mb-4">¡Tu contraseña ha sido cambiada exitosamente! Ya puedes iniciar sesión con tu nueva contraseña.</p>

                        <a href="{% url 'login' %}" class="btn btn-primary w-100 btn-lg mb-3">Ir a Ingresar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <hr class="footer-divider" style="margin-top:0;">
            <p class="footer-bottom">© 2026 MascotasNet — Diseñado con ❤️ para cambiar vidas de mascotas</p>
        </div>
    </footer>

</body>
</html>
